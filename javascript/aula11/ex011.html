<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detran</title>
</head>
<body>
    <h1>Sistema de Multas</h1>

    <input type="number" name="txtvel" id="txtvel"> km/h

    <input type="button" value="Verificar" onclick="calcular()">
    
    <div id="res"></div>

    <script>
        function calcular(){
            var txtvel = window.document.getElementById('txtvel')
            var res = window.document.getElementById('res')

            var vel = Number(txtvel.value)

            res.innerHTML = `<p>Sua velocidade atual é de ${vel} km/h</p>`

            if(vel > 60){
                res.innerHTML += `<p>Você está multado</p>`
            }

            res.innerHTML += `<p>Diraja sempre com cinto de segurança!</p>`
        }
    </script>
</body>
</html>
