<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boas Vindas</title>

    <style>
        button{
            padding: 25px;
            font: normal 20px Arial;
        }
    </style>
</head>
<body>
    <h1>Boas-Vindas</h1>
    <button id="botao" onclick="apresentar()">Inicie o desafio</button>

    <script>
        
        function apresentar(){
            var nome = window.prompt('Qual é o seu nome?')  
            var idade = window.prompt(`Olá, ${nome}! Quantos anos você tem?`)
            window.alert(`Acabei de conher ${nome}, que tem ${idade} anos de idade!`)
        }
    </script>
</body>
</html>
