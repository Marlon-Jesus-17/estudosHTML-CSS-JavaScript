<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste 1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <form action="Cadastro.java" method="get">
        
            <div id="titulo">
                <p>Entrar no facebook</p>
            </div>
            <div>
                <input type="text" name="nome" id="nome" placeholder="Email ou número de celular" class="caixa_texto">
            </div>
            <div>
                <input type="password" name="senha" id="senha" placeholder="Senha" class="caixa_texto">
            </div>
            <div>
                <input type="button" value="Entrar" class="botao botao_entrar">
            </div>
            <div>
                <input type="button" value="Esqueceu a senha?" class="botao botao_esqueceusenha">
            </div>
            <div>
                <input type="button" value="Criar nova conta" class="botao botao_criarnovaconta">
            </div>
            <div class="rodape">
                <p>Meta</p>
            </div>
        </form>
    </main>
</body>
</html>
