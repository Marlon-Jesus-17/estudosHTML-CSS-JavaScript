<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes com Google Fontes</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bad+Script&display=swap');

        body{
            font-family: 'Bad Script', Arial, Helvetica, sans-serif;
            font-size: 16px;
            color: black;
        }
        h1{
            font-family: 'Bad Script','Times New Roman', Times, serif;
            font-size: 2em;
        }
    </style>
</head>
<body>
    <h1>Título</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Exercitationem laboriosam porro provident in earum, expedita ipsam voluptatum maxime. Provident totam culpa id aspernatur, praesentium magnam alias. Incidunt fuga nihil eveniet!</p>
    
</body>
</html>
