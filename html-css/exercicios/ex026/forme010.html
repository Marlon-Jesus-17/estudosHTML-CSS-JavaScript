<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Exemplo de Formulário</h1>

    <form action="Cadastro.java" method="get">

        <label for="ano">Em que ano você nasceu?</label>
        <input type="number" name="ano" id="ano" min="1900" max="2026" oninput=calcIdade()>

        <p>
            <label for="idade">Sua idade é:</label>
            <output id="idade">0</output>
        </p>
    </form>

    <script>
        function calcIdade(){
            let atual = new Date().getFullYear()
            idade.innerHTML = Number(atual) - Number(ano.value)
        }
    </script>
</body>
</html>
