<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela Desáfio</title>

    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        #container{
            overflow-x: auto; /*Adiciona uma rolagem vertical somente na tabela*/
        }

        table{
            border-collapse: collapse;
            width: 500px;
        }

        caption{
            font-weight: bold;
            font-size: 20px;
            padding: 5px;
        }

        td, th{
            border: 1px solid black;
            text-align: center;
        }

        .titulo{
            background-color: gray;
            color: white;
            font-weight: bold;
        }

        .esquerda{
            text-align: left;
        }
    </style>
</head>
<body>
    
    <div id="container">

        <table>

            <caption>Notas dos Alunos</caption>

            <thead>
                <tr>
                    <th class="titulo" rowspan="2" scope="col">Área</th>
                    <th class="titulo" rowspan="2" scope="col">Disciplina</th>
                    <th class="titulo" colspan="2" scope="colgroup">Notas</th>
                    <th class="titulo" rowspan="2" scope="col">Média</th>
                </tr>
                <tr>
                    <th class="titulo" scope="col">Nota1</th>
                    <th class="titulo" scope="col">Nota2</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <th rowspan="4" scope="rowgroup" scope="rowgroup"> Exatas</th>
                    <td class="esquerda">Matemática</td>
                    <td>0.0</td>
                    <td>0.0</td>
                    <td>0.0</td>
                </tr>
                <tr>
                    <td class="esquerda">Física</td>
                    <td>0.0</td>
                    <td>0.0</td>
                    <td>0.0</td>
                </tr>
                <tr>
                    <td class="esquerda">Química</td>
                    <td>0.0</td>
                    <td>0.0</td>
                    <td>0.0</td>
                </tr>
                <tr>
                    <td class="esquerda">Biologia</td>
                    <td>0.0</td>
                    <td>0.0</td>
                    <td>0.0</td>
                </tr>
                <tr>
                    <th colspan="4" class="titulo esquerda" scope="row">Média de Exatas</th>
                    <td class="titulo">0.0</td>
                </tr>
                <tr>
                    <th rowspan="2" scope="rowgroup">Humanas</th>
                    <td class="esquerda">História</td>
                    <td>0.0</td>
                    <td>0.0</td>
                    <td>0.0</td>
                </tr>
                <tr>
                    <td class="esquerda">Geografia</td>
                    <td>0.0</td>
                    <td>0.0</td>
                    <td>0.0</td>
                </tr>
                <tr>
                    <th colspan="4" class="titulo esquerda" scope="row">Média de Humanas</th>
                    <td class="titulo">0.0</td>
                </tr>
            </tbody>
        </table>
    </div>

</body>
</html>
